    /* NAVBAR */
    .navbar {
      background: #111;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      margin: 0 8px;
      transition: 0.3s;
    }

    }

      padding: 15px 10px 5px;
      font-size: 20px;
      color: #00d4ff;

      max-width: 900px;
      margin: auto;
      padding: 10px;
    }

    /* IMAGE STYLE */
    .reader img {
      width: 100%;
      display: block;
      margin-bottom: 10px;
      border-radius: 6px;
      background: #000;
    }

    /* NAV BUTTONS */
    .nav-btn {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      max-width: 900px;
      margin: auto;
    }

    .nav-btn a {
      text-decoration: none;
      color: white;
      background: #00d4ff;
      padding: 10px 15px;
      border-radius: 6px;
      font-size: 14px;
    }

    .nav-btn a:hover {
      background: #0099cc;
    }

    /* MOBILE */
    @media (max-width: 500px) {
      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
