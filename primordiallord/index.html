<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Primordial Lord: Mutation Sovereign</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      background: #111;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid #222;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .navbar a:hover {
      color: #00d4ff;
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 25px 10px 10px;
    }

    .header h2 {
      margin: 0;
      font-size: 26px;
      color: #00d4ff;
    }

    .header p {
      color: #aaa;
      font-size: 13px;
      margin-top: 5px;
    }

    /* CONTAINER */
    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    /* CHAPTER CARD */
    .chapter {
      background: #1a1a1a;
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s ease;
      border: 1px solid #222;
    }

    .chapter:hover {
      background: #222;
      transform: translateY(-3px);
      border-color: #00d4ff;
    }

    .chapter a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
      display: block;
    }

    /* FOOTER */
    .footer {
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #222;
      margin-top: 20px;
    }

    /* MOBILE */
    @media (max-width: 500px) {
      .header h2 {
        font-size: 22px;
      }

      .chapter a {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="../index.html">🏠 Home</a>
</div>

<!-- HEADER -->
<div class="header">
  <h2>Primordial Lord: Mutation Sovereign</h2>
  <p>Select a chapter to start reading</p>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="chapter">
    <a href="chapter1.html">Chapter 1</a>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © Fans Based Manhua
</div>

</body>
</html>
